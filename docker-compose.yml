version: '3.8'

services:
  fl_server:
    build:
      context: .
      dockerfile: docker/Dockerfile.fl_server
    ports:
      - "8080:8080"
    volumes:
      - ./schemas:/app/schemas
      - ./fl_implementation:/app/fl_implementation
    networks:
      - federated_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

  bank_node_1:
    build:
      context: .
      dockerfile: docker/Dockerfile.bank_node
    environment:
      - NODE_ID=1
      - SERVER_ADDRESS=fl_server:8080
      - DATA_FILE=/app/data.csv
    volumes:
      - ./fl_implementation/data/bank_1.csv:/app/data.csv:ro
    depends_on:
      - fl_server
    networks:
      - federated_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  bank_node_2:
    build:
      context: .
      dockerfile: docker/Dockerfile.bank_node
    environment:
      - NODE_ID=2
      - SERVER_ADDRESS=fl_server:8080
      - DATA_FILE=/app/data.csv
    volumes:
      - ./fl_implementation/data/bank_2.csv:/app/data.csv:ro
